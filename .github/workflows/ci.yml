name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # 2. Grab your code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 3. Install the 'uv' package manager
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      # 4. Set up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # 5. Install your package and all dev dependencies (ruff, mypy, pytest)
      - name: Install dependencies
        run: uv sync --all-extras --dev

      # 6. Run the linters and formatters (using --check so it fails if formatting is wrong)
      - name: Check code formatting and linting (Ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      # 7. Run static type checking
      - name: Type check (Mypy)
        run: uv run mypy .

      # 8. Run the test suite
      - name: Test (Pytest)
        run: uv run pytest
        env:
          # Inject a fake key so Pydantic successfully builds the Settings object
          API_KEY: "sk-dummy-testing-key-123"
          APP_ENV: "testing"
